<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <title>Shipment Tracker</title> <style> body { font-family: Arial, sans-serif; margin: 2rem; } label, select, input, button { font-size: 1rem; margin: 0.5rem 0; } #result { margin-top: 1rem; padding: 1rem; border: 1px solid #ccc; background: #f9f9f9; } #addCarrierSection { margin-top: 2rem; } </style> </head> <body> <h1>Shipment Tracking</h1> <label for="carrier">Select Carrier:</label> <select id="carrier"> <option value="QR">QR (Qatar Airways)</option> <option value="TG">TG (Thai Airways)</option> <option value="CX">CX (Cathay Pacific)</option> <option value="KE">KE (Korean Air)</option> <option value="SQ">SQ (Singapore Airlines)</option> </select> <br /> <label for="awb">Enter AWB Number:</label> <input type="text" id="awb" placeholder="AWB Number" /> <br /> <button onclick="trackShipment()">Track Shipment</button> <div id="result"></div> <div id="addCarrierSection"> <h3>Add More Carrier</h3> <input type="text" id="newCarrierCode" placeholder="Carrier Code (e.g. AA)" maxlength="2" style="width: 80px;" /> <input type="text" id="newCarrierName" placeholder="Carrier Name" style="width: 200px;" /> <button onclick="addCarrier()">Add Carrier</button> </div> <script> const carrierApiUrls = { QR: 'https://api.iata.org/tracking/v1/shipments/qr/', TG: 'https://api.pkge.net/track/tg/', CX: 'https://api.cathaycargo.com/v1/track/', KE: 'https://cargo.koreanair.com/api/v1/track/', SQ: 'https://api.siacargo.com/v1/track/' }; function trackShipment() { const carrier = document.getElementById('carrier').value; const awb = document.getElementById('awb').value.trim(); const resultDiv = document.getElementById('result'); if (!awb) { resultDiv.textContent = 'Please enter a valid AWB number.'; return; } if (!carrierApiUrls[carrier]) { resultDiv.textContent = 'Selected carrier API is not configured.'; return; } resultDiv.textContent = 'Fetching shipment info...'; fetch(carrierApiUrls[carrier] + awb) .then(response => { if (!response.ok) throw new Error('Network response was not ok'); return response.json(); }) .then(data => { resultDiv.innerHTML = `<strong>Status:</strong> ${data.status}<br><strong>ETA:</strong> ${data.eta}<br><strong>Origin:</strong> ${data.origin}<br><strong>Destination:</strong> ${data.destination}`; }) .catch(error => { resultDiv.textContent = 'Error fetching shipment info: ' + error.message; }); } function addCarrier() { const codeInput = document.getElementById('newCarrierCode'); const nameInput = document.getElementById('newCarrierName'); const code = codeInput.value.trim().toUpperCase(); const name = nameInput.value.trim(); if (!code || code.length !== 2) { alert('Carrier code must be exactly 2 characters.'); return; } if (!name) { alert('Carrier name cannot be empty.'); return; } if (carrierApiUrls[code]) { alert('Carrier code already exists.'); return; } carrierApiUrls[code] = `https://api.example.com/track/${code.toLowerCase()}/`; const carrierSelect = document.getElementById('carrier'); const option = document.createElement('option'); option.value = code; option.textContent = `${code} (${name})`; carrierSelect.appendChild(option); codeInput.value = ''; nameInput.value = ''; alert(`Carrier ${code} (${name}) added.`); } </script> </body> </html>
